<title>LIVE DRAW GENERATOR</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,
    #666 0%,
    #333 40%,
    #111 100%);

    min-height:100vh;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

.output{
    width:100%;
    min-height:180px;

    background:rgba(0,0,0,.35);

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.1);

    border-radius:12px;

    color:white;
    padding:25px;
    font-size:18px;
    font-weight:bold;

    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;

    margin-bottom:30px;
}

.animasi{
    animation:muncul .4s ease;
}

@keyframes muncul{
    0%{
        opacity:0;
        transform:scale(.9);
    }
    100%{
        opacity:1;
        transform:scale(1);
    }
}

.controls{
    display:flex;
    flex-direction:column;
    gap:15px;
    width:250px;
}

select{
    height:45px;
    padding:0 10px;
    font-size:16px;
    border:none;
}

button{
    height:45px;
    border:none;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

.live{
    background:#f0bc00;
}

.prediksi{
    background:#0099e6;
    color:white;
}

button:hover{
    opacity:.9;
}

.live,
.prediksi{
    transition:.2s;
}

@keyframes bounceBtn{
    0%{transform:scale(1);}
    30%{transform:scale(.85);}
    60%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

.tekan{
    animation:bounceBtn .35s;
}

.tanggal-box{
    display:flex;
    gap:8px;
}

.tanggal-box input{
    height:45px;
    border:none;
    padding:0 10px;
    font-size:16px;
}

#hari{
    width:70px;
}

#bulan{
    width:80px;
    text-transform:uppercase;
}

#tahun{
    width:90px;
}

.runner{
    position:fixed;
    bottom:40px;
    left:-120px;
    width:60px;
    height:120px;
    animation:lariCepat 1s linear infinite;
}

.head{
    width:25px;
    height:25px;
    border-radius:50%;
    background:white;
    position:absolute;
    left:24px;
    top:2px;
}

.body{
    width:4px;
    height:40px;
    background:white;
    position:absolute;
    top:25px;
    left:28px;
    transform:rotate(15deg);
}

.arm,
.leg{
    width:4px;
    background:white;
    position:absolute;
    transform-origin:top center;
}

.arm{
    height:38px;
    top:28px;
    left:28px;
}

.leg{
    height:42px;
    top:62px;
    left:28px;
}

.arm1,
.leg1{
    animation:gerak1 .15s infinite alternate;
}

.arm2,
.leg2{
    animation:gerak2 .15s infinite alternate;
}

@keyframes gerak1{
    from{
        transform:rotate(-70deg);
    }
    to{
        transform:rotate(70deg);
    }
}

@keyframes gerak2{
    from{
        transform:rotate(70deg);
    }
    to{
        transform:rotate(-70deg);
    }
}

@keyframes lariCepat{
    from{
        left:-120px;
    }
    to{
        left:110%;
    }
}

#zeus{
    position:fixed;
    width:280px;
    left:50%;
    bottom:-450px;
    transform:translateX(-50%);
    pointer-events:none;
    z-index:9999;
    animation:zeusMuncul 4s ease forwards;
}

@keyframes zeusMuncul{
    0%{
        bottom:-450px;
        opacity:0;
        transform:translateX(-50%) scale(.5);
    }

    25%{
        opacity:1;
        transform:translateX(-50%) scale(1.15);
    }

    50%{
        bottom:120px;
        opacity:1;
        transform:translateX(-50%) scale(1);
    }

    70%{
        bottom:140px;
    }

    100%{
        bottom:250px;
        opacity:0;
        transform:translateX(-50%) scale(.8);
    }
}

body::after{
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    background:white;
    opacity:0;
    animation:petir 4s ease forwards;
}

@keyframes petir{
    0%,15%,100%{
        opacity:0;
    }

    18%{
        opacity:.7;
    }

    20%{
        opacity:0;
    }

    23%{
        opacity:.5;
    }

    25%{
        opacity:0;
    }
}

.petir{
    position:fixed;
    width:120px;
    z-index:9998;
    pointer-events:none;
    animation:kilat .8s ease forwards;
}

@keyframes kilat{
    0%{
        opacity:0;
        transform:scale(.3);
    }

    20%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:scale(1.3);
    }
}

#gifDiam{
    position: fixed;
    width: 150px;
    right: 120px;
    bottom: 823px;
    z-index: 9997;
}

</style>

<script>



function setTanggalOtomatis() {
    document.getElementById("hari").value =
        new Date().getDate();
}

setTanggalOtomatis();

const selectPasaran = document.getElementById("pasaran");
const hasil = document.getElementById("hasil");
function animasiHasil(teks){

    hasil.classList.remove("animasi");

    void hasil.offsetWidth;

    hasil.innerHTML = teks;

    hasil.classList.add("animasi");

    navigator.clipboard.writeText(teks);
}

function getTanggalManual(){

    const hari =
    document.getElementById("hari").value;

    const bulan =
    document.getElementById("bulan").value.toUpperCase();

    const tahun =
    document.getElementById("tahun").value;

    return `${hari} ${bulan} ${tahun}`;
}

function getTanggalPrediksi(){

    const hari =
    parseInt(document.getElementById("hari").value);

    const bulan =
    document.getElementById("bulan").value.toUpperCase();

    const tahun =
    document.getElementById("tahun").value;

    return `${hari + 1} ${bulan} ${tahun}`;
}

function animasiTombol(btn){

    btn.classList.remove("tekan");

    void btn.offsetWidth;

    btn.classList.add("tekan");
}

function liveDraw(){

    const index = selectPasaran.selectedIndex;
    const pasaran = selectPasaran.options[index].text;

const teks =
`LIVE DRAW TOGEL ${pasaran} TANJUNGTOTO ${getTanggalManual()}`;

animasiHasil(teks);

    let next = index + 1;

    if(next >= selectPasaran.options.length){
        next = 0;
    }

    selectPasaran.selectedIndex = next;
}

function prediksi(){

    const index = selectPasaran.selectedIndex;

    const pasaran = daftarPrediksi[index];

    const teks =
  `PREDIKSI TOGEL ${pasaran} ${getTanggalPrediksi()} TANJUNGTOTO`;

animasiHasil(teks);

    let next = index + 1;

    if(next >= selectPasaran.options.length){
        next = 0;
    }

    selectPasaran.selectedIndex = next;
}
